# Bootstrap Kustomization. Installs everything Arcade needs in-cluster:
# cert-manager, ingress-nginx, external-secrets, and the ESO machinery
# (SecretStore + ExternalSecrets) that materializes the chart's expected
# Secret names from Key Vault.
#
# The fluxConfigurations resource in bicep references this directory via
# `kustomizations.bootstrap.path: ./bootstrap`. Flux applies these manifests
# and waits for them to be Ready (wait: true) before the dependent `arcade`
# Kustomization starts.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cert-manager-helmrelease.yaml
  - ingress-nginx-helmrelease.yaml
  - external-secrets-helmrelease.yaml
  - letsencrypt-prod-clusterissuer.yaml
  - arcade-kv-secretstore.yaml
  - arcade-externalsecrets.yaml
