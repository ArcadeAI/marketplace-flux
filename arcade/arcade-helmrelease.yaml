# Arcade chart install via Flux HelmRelease. Bootstrap Kustomization must
# complete first (cert-manager + ingress-nginx + ESO + the ExternalSecrets
# that materialize the chart's expected Secret names from Key Vault).
#
# Variable substitution at apply time (Flux postBuild.substitute):
#   ${HOSTNAME}            — customer-supplied domain (e.g. arcade.example.com)
#   ${NAMESPACE}           — release namespace (default: arcade)
#   ${RELEASE_NAME}        — helm release name (default: arcade)
#   ${CHART_OCI_URI}       — chart OCI registry URI (e.g. oci://public.ecr.aws/s5i6x9d1/charts/arcade)
#   ${CHART_VERSION}       — pinned chart version
#   ${POSTGRES_HOST}       — Azure Database for PostgreSQL FQDN
#   ${POSTGRES_USER}       — Postgres admin username
#   ${REDIS_HOST}          — bundled in-cluster Redis hostname (since AMR listKeys is denied — see capsol guidance://migrate-helm-deploy-to-k8s-extension)
#   ${REDIS_PORT}          — Redis port
#   ${ENTRA_APP_CLIENT_ID} — non-secret OIDC client ID
#   ${ENTRA_APP_ISSUER}    — OIDC issuer URL
#   ${LETSENCRYPT_EMAIL}   — ACME registration email
#
# Secrets are NOT in these substitutions — they're consumed via existingSecret
# references that point at the ESO-materialized Secrets in this namespace.

apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: arcade-charts
  namespace: flux-system
spec:
  interval: 24h
  type: oci
  url: oci://public.ecr.aws/s5i6x9d1/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  # HelmRelease lives in flux-system (same as the HelmRepository sourceRef)
  # because the microsoft.flux AKS extension enforces multiTenancy by default —
  # cross-namespace references between HelmRelease and HelmRepository would be
  # blocked with "cross-namespace references are not allowed". The chart is
  # released INTO the arcade namespace via spec.targetNamespace + storageNamespace.
  name: arcade
  namespace: flux-system
spec:
  interval: 10m
  releaseName: ${RELEASE_NAME}
  # The chart's resources land in this namespace; HelmRelease metadata stays in flux-system.
  targetNamespace: ${NAMESPACE}
  storageNamespace: ${NAMESPACE}
  install:
    createNamespace: true
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
  timeout: 25m
  # Strip the cert-manager.io/cluster-issuer annotation that the chart emits on
  # every Ingress when ingress.letsEncrypt.enabled is true. With the annotation
  # present, ingress-shim would create per-Ingress single-host Certificates
  # targeting the same `arcade-public-tls` Secret that public-certificate.yaml
  # owns, racing with the multi-SAN Certificate CR. Removing the annotation
  # leaves the `tls.secretName` reference intact (nginx still terminates with
  # the multi-SAN cert) but disables ingress-shim's Certificate-management
  # behavior on these Ingresses.
  postRenderers:
    - kustomize:
        patches:
          # Strategic-merge patch — setting an annotation value to null removes
          # the key. Tolerates Ingresses that don't have the annotation (the
          # `remove` JSON Patch op would error on those). Targets every
          # Ingress in apiGroup networking.k8s.io.
          - target:
              group: networking.k8s.io
              kind: Ingress
            patch: |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: ignored-by-target-selector
                annotations:
                  cert-manager.io/cluster-issuer: null
  chart:
    spec:
      chart: arcade
      version: ${CHART_VERSION}
      sourceRef:
        kind: HelmRepository
        name: arcade-charts
        namespace: flux-system
  values:
    # Bundled Redis subchart (in-cluster). AMR is intentionally not used in
    # Marketplace because listKeys/action is denied by the Marketplace deny
    # assignment; the chart's hand-rolled redis subchart serves the same role
    # without external dependencies for the Standard plan.
    redis:
      enabled: true
      auth:
        enabled: true
        # ESO materializes this Secret from `arcade-redis-password` in KV
        # (newGuid-defaulted in resourceGroup.bicep). Replaces the chart's
        # literal `secret` default.
        existingSecret: arcade-redis-password
        existingSecretKey: REDIS_PASSWORD
    postgres:
      enabled: false
      host: ${POSTGRES_HOST}
      sslmode: require
      auth:
        username: ${POSTGRES_USER}
        existingSecret: arcade-postgres-admin-password
        existingSecretKey: password
    playground:
      # Chart consumes existingAnthropicApiKeySecret / existingAnthropicApiKeySecretKey
      # (per deploy/charts/arcade/values.yaml). `existingSecret`/`existingSecretKey`
      # are silently ignored — the chart falls back to its empty default and
      # ships ANTHROPIC_API_KEY="" into experience-api, orphaning the ESO secret.
      existingAnthropicApiKeySecret: arcade-playground-api-key
      existingAnthropicApiKeySecretKey: api-key
    auth:
      upstreamIdp:
        # Chart reads `auth.upstreamIdp.secretName`, NOT `existingSecret`. The
        # latter is silently dropped by Helm; the chart's seed-idp-job consumes
        # secretName via envFrom: secretRef.
        secretName: upstream-idp-creds
      gatewayLogin:
        issuer: ${ENTRA_APP_ISSUER}
    arcade:
      dashboardUrl: https://${HOSTNAME}
    ingress:
      enabled: true
      type: public
      publicIngressClass: nginx
      hostname: ${HOSTNAME}
      letsEncrypt:
        # Enabled so the chart's per-host Ingresses render a `tls:` block
        # pointing at `arcade-public-tls`. The cert-manager.io/cluster-issuer
        # annotation that the chart emits on the same flag is stripped by the
        # spec.postRenderers patch above — we own the cert via the explicit
        # Certificate CR in public-certificate.yaml (single multi-SAN cert
        # covering apex + 4 subdomains). Leaving ingress-shim active would
        # race with that CR over the `arcade-public-tls` Secret.
        enabled: true
        clusterIssuer: letsencrypt-prod
    gateway:
      enabled: false
    environment: pro
    coordinator:
      replicaCount: 2
      hpa:
        enabled: false
    dashboard:
      replicaCount: 2
      hpa:
        enabled: false
    experienceApi:
      replicaCount: 2
      hpa:
        enabled: false
    engine:
      replicaCount: 2
      hpa:
        enabled: false
      reconcile:
        enabled: true
    workerDefaults:
      replicaCount: 2
      hpa:
        enabled: false
    # dockerRegistry intentionally disabled — Marketplace deploys pull images
    # from the customer's private ACR. The ACR cache rule (provisioned in
    # container-registry.bicep) hydrates each tag from quay.io/arcade/*
    # lazily on the first kubelet pull. The platform Kustomization's
    # image-prewarm Job pre-pulls all 5 chart images before this HelmRelease
    # runs, so helm-install doesn't race the cache-rule propagation. AKS
    # kubelet has AcrPull on the registry (granted in container-registry.bicep),
    # so no in-cluster imagePullSecret is needed.
    dockerRegistry:
      enabled: false
    dashboard:
      image:
        repository: ${ACR_LOGIN_SERVER}/arcade/dashboard
        tag: "${IMAGE_TAG}"
    engine:
      image:
        repository: ${ACR_LOGIN_SERVER}/arcade/engine
        tag: "${IMAGE_TAG}"
    workerDefaults:
      image:
        repository: ${ACR_LOGIN_SERVER}/arcade/worker
        tag: "${IMAGE_TAG}"
      # ESO materializes this Secret from `arcade-worker-shared-secret` in KV
      # (newGuid-defaulted in resourceGroup.bicep). Replaces the chart's
      # literal `dev` default.
      existingSecret: arcade-worker-shared-secret
      existingSecretKey: ARCADE_WORKER_SECRET
    experienceApi:
      image:
        repository: ${ACR_LOGIN_SERVER}/arcade/experience-api
        tag: "${IMAGE_TAG}"
    coordinator:
      image:
        repository: ${ACR_LOGIN_SERVER}/arcade/coordinator
        tag: "${IMAGE_TAG}"
