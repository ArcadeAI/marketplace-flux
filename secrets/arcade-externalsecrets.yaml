# Materialize the Kubernetes Secrets the Arcade chart expects from the
# customer's Key Vault. Names here match the chart's `existingSecret` /
# `existingSecretKey` defaults (see deploy/charts/arcade/values.yaml).
#
# The bootstrap Kustomization should wait for these to be Ready before the
# Arcade Kustomization starts.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-postgres-admin
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-postgres-admin-password
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Chart helper arcade.db.env (templates/_helpers.tpl) emits secretKeyRefs
        # for BOTH `password` and `DB_PASSWORD_URLENC` against the same Secret.
        # experience-api fails with CreateContainerConfigError if the
        # DB_PASSWORD_URLENC key is missing — DATABASE_URL substitutes that env
        # var verbatim. The `urlquery` template function percent-encodes the
        # password so URL-reserved characters parse correctly.
        password: "{{ .password }}"
        DB_PASSWORD_URLENC: "{{ .password | urlquery }}"
  data:
    - secretKey: password
      remoteRef:
        key: arcade-postgres-admin-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-upstream-idp-creds
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: upstream-idp-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        UPSTREAM_NAME: "{{ .upstream_name }}"
        UPSTREAM_ISSUER: "{{ .upstream_issuer }}"
        UPSTREAM_CLIENT_ID: "{{ .upstream_client_id }}"
        UPSTREAM_CLIENT_SECRET: "{{ .upstream_client_secret }}"
  data:
    - secretKey: upstream_name
      remoteRef:
        key: arcade-upstream-idp-name
    - secretKey: upstream_issuer
      remoteRef:
        key: arcade-upstream-idp-issuer
    - secretKey: upstream_client_id
      remoteRef:
        key: arcade-upstream-idp-client-id
    - secretKey: upstream_client_secret
      remoteRef:
        key: arcade-upstream-idp-client-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-playground-api-key
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-playground-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: arcade-playground-api-key
---
# Worker shared secret. Chart helper looks for envFrom on a Secret with the
# key ARCADE_WORKER_SECRET (see workerDefaults.existingSecretKey). The
# chart's default 'dev' literal is overridden in arcade-helmrelease.yaml
# via workerDefaults.existingSecret pointing here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-worker-shared-secret
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-worker-shared-secret
    creationPolicy: Owner
  data:
    - secretKey: ARCADE_WORKER_SECRET
      remoteRef:
        key: arcade-worker-shared-secret
---
# Redis password for the in-cluster bundled Redis. Chart's redis.auth
# block reads existingSecretKey=REDIS_PASSWORD from a Secret pointed at
# by redis.auth.existingSecret. Bundled Redis subchart is the only
# Marketplace path (AMR is denied by the deny assignment); the password
# here is what the bundled Redis Server uses and what the chart's clients
# (engine, coordinator, worker) read via envFrom.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-redis-password
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-redis-password
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: arcade-redis-password
