# Materialize the Kubernetes Secrets the Arcade chart expects from the
# customer's Key Vault. Names here match the chart's `existingSecret` /
# `existingSecretKey` defaults (see deploy/charts/arcade/values.yaml).
#
# The bootstrap Kustomization should wait for these to be Ready before the
# Arcade Kustomization starts.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-postgres-admin
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-postgres-admin-password
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Chart helper arcade.db.env (templates/_helpers.tpl) emits secretKeyRefs
        # for BOTH `password` and `DB_PASSWORD_URLENC` against the same Secret.
        # experience-api fails with CreateContainerConfigError if the
        # DB_PASSWORD_URLENC key is missing — DATABASE_URL substitutes that env
        # var verbatim. The `urlquery` template function percent-encodes the
        # password so URL-reserved characters parse correctly.
        password: "{{ .password }}"
        DB_PASSWORD_URLENC: "{{ .password | urlquery }}"
  data:
    - secretKey: password
      remoteRef:
        key: arcade-postgres-admin-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-upstream-idp-creds
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: upstream-idp-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        UPSTREAM_NAME: "{{ .upstream_name }}"
        UPSTREAM_ISSUER: "{{ .upstream_issuer }}"
        UPSTREAM_CLIENT_ID: "{{ .upstream_client_id }}"
        UPSTREAM_CLIENT_SECRET: "{{ .upstream_client_secret }}"
  data:
    - secretKey: upstream_name
      remoteRef:
        key: arcade-upstream-idp-name
    - secretKey: upstream_issuer
      remoteRef:
        key: arcade-upstream-idp-issuer
    - secretKey: upstream_client_id
      remoteRef:
        key: arcade-upstream-idp-client-id
    - secretKey: upstream_client_secret
      remoteRef:
        key: arcade-upstream-idp-client-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcade-playground-api-key
  namespace: ${NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcade-kv
    kind: ClusterSecretStore
  target:
    name: arcade-playground-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: arcade-playground-api-key
