# Phase 2 — secret machinery. Depends on the platform Kustomization completing
# (CRDs for cert-manager.io/v1.ClusterIssuer and external-secrets.io/v1.* must
# exist before these manifests can dry-run-validate, which Flux does before
# applying).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - letsencrypt-prod-clusterissuer.yaml
  - arcade-kv-secretstore.yaml
  - arcade-externalsecrets.yaml
  # Lists the Azure Managed Redis access key (in-cluster workload identity,
  # MRG-resident → exempt from the deny) and writes it as the
  # arcade-redis-password Secret. The arcade Kustomization waits for this.
  - redis-key-job.yaml
  # Mints per-customer Quay pull creds via the mediator (same WI mechanism)
  # and writes the arcade-quay-pull-secret dockerconfigjson Secret. Replaces
  # the embed-in-zip path (which would leak the robot + trip CredScan).
  - quay-creds-job.yaml
