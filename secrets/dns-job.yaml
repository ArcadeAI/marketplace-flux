# Managed-DNS materializer.
#
# The chart needs a hostname at install time (ingress + multi-SAN cert), but a
# form-driven Marketplace deploy has no domain — the publisher assigns one under
# the managed zone via the mediator's /v1/dns endpoint. The old deploymentScript
# flow called /v1/dns directly; deploymentScripts don't work in the MRG, so this
# is an in-cluster Job (same proven workload-identity pattern as redis-key /
# quay-creds).
#
# Two phases in one Job:
#   1. POST /v1/dns {resourceId}  -> mediator assigns (or returns) a hostname
#      <label>.<zone>. Write it to the arcade-dns-config ConfigMap in flux-system
#      so the arcade Kustomization's postBuild.substituteFrom picks up the
#      HOSTNAME variable BEFORE the chart + cert render.
#   2. Poll for the ingress-nginx LoadBalancer IP, then POST /v1/dns
#      {resourceId, ip} -> mediator writes the apex + wildcard A records pointing
#      at the LB. cert-manager then solves HTTP-01 against the live records.
#
# BYO-domain branch: if DOMAIN_NAME is non-empty (operator passed a domain), use
# it verbatim and skip the mediator — the operator manages their own DNS.
#
# Runs in the secrets Kustomization (arcade dependsOn secrets, wait:true) so the
# ConfigMap + A records exist before the chart installs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arcade-dns-config-writer
  namespace: flux-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arcade-dns-config-writer
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arcade-dns-config-writer
subjects:
  - kind: ServiceAccount
    name: arcade-external-secrets-reader
    namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arcade-dns-lb-reader
  namespace: ingress-nginx
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arcade-dns-lb-reader
  namespace: ingress-nginx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arcade-dns-lb-reader
subjects:
  - kind: ServiceAccount
    name: arcade-external-secrets-reader
    namespace: ${NAMESPACE}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: arcade-managed-dns
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: arcade-external-secrets-reader
      containers:
        - name: managed-dns
          image: mcr.microsoft.com/azure-cli:2.70.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # IMPORTANT: shell variables here use bare $VAR, never the
              # dollar-brace form. Flux postBuild runs envsubst over this whole
              # manifest at apply time: it rewrites dollar-brace tokens (blanking
              # any not in the substitute map) and even fails to parse a literal
              # dollar-brace-dot sequence. Bare $VAR passes through untouched and
              # is expanded by the shell at runtime. (Do not write brace-form
              # tokens even in comments — envsubst parses those too.)
              az login --service-principal \
                -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" \
                --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                --allow-no-subscriptions >/dev/null

              az aks install-cli --install-location /tmp/kubectl \
                --kubelogin-install-location /tmp/kubelogin --only-show-errors

              if [[ -n "$DOMAIN_NAME" ]]; then
                ARC_HOST="$DOMAIN_NAME"
                echo "==> BYO domain: $ARC_HOST"
              else
                echo "==> Requesting managed hostname from mediator"
                BEARER=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
                RESP=$(curl --fail-with-body -sS -X POST "$MEDIATOR_URL/v1/dns" \
                  -H "Authorization: Bearer $BEARER" -H "Content-Type: application/json" \
                  -d "{\"resourceId\":\"$MEDIATOR_RESOURCE_ID\"}")
                ARC_HOST=$(printf '%s' "$RESP" | python3 -c "import json,sys;print(json.load(sys.stdin).get('hostname',''))")
                if [[ -z "$ARC_HOST" ]]; then echo "FATAL: mediator returned no hostname" >&2; exit 1; fi
                echo "==> Assigned hostname: $ARC_HOST"
              fi

              # Publish the hostname for the arcade Kustomization's substituteFrom.
              /tmp/kubectl create configmap arcade-dns-config -n flux-system \
                --from-literal=HOSTNAME="$ARC_HOST" \
                --dry-run=client -o yaml | /tmp/kubectl apply -f -
              echo "==> Wrote arcade-dns-config (HOSTNAME=$ARC_HOST)"

              if [[ -n "$DOMAIN_NAME" ]]; then
                echo "==> BYO domain — skipping mediator A-record registration"
                exit 0
              fi

              echo "==> Waiting for ingress-nginx LoadBalancer IP"
              ARC_LB_IP=""
              for i in $(seq 1 60); do
                ARC_LB_IP=$(/tmp/kubectl get svc ingress-nginx-controller -n ingress-nginx \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
                [[ -n "$ARC_LB_IP" ]] && break
                sleep 10
              done
              if [[ -z "$ARC_LB_IP" ]]; then echo "FATAL: no LB IP after 10m" >&2; exit 1; fi
              echo "==> LB IP: $ARC_LB_IP — registering A records"

              BEARER=$(az account get-access-token --resource https://management.azure.com/ --query accessToken -o tsv)
              curl --fail-with-body -sS -X POST "$MEDIATOR_URL/v1/dns" \
                -H "Authorization: Bearer $BEARER" -H "Content-Type: application/json" \
                -d "{\"resourceId\":\"$MEDIATOR_RESOURCE_ID\",\"ip\":\"$ARC_LB_IP\"}" >/dev/null
              echo "==> Registered $ARC_HOST + wildcard -> $ARC_LB_IP"
          env:
            - name: MEDIATOR_URL
              value: "${MEDIATOR_URL}"
            - name: MEDIATOR_RESOURCE_ID
              value: "${MEDIATOR_RESOURCE_ID}"
            - name: DOMAIN_NAME
              value: "${DOMAIN_NAME}"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
