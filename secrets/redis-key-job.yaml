# Azure Managed Redis access-key materializer.
#
# AMR generates its access key server-side; the only way to read it is
# `listKeys`, a control-plane *action that the Marketplace deny assignment
# blocks for the deploy-time principal. BUT a managed identity created inside
# the MRG is exempt from the deny (the deny's condition is
# `@Subject[ResourceId] StringNotStartsWith '<MRG>'`), so an in-cluster pod
# using workload identity federated to an MRG-resident UAMI CAN call listKeys
# at runtime. (Verified empirically 2026-06-27.)
#
# This Job reuses the already-federated `arcade-external-secrets-reader`
# ServiceAccount (federated to the ESO UAMI, which is granted Redis Cache
# Contributor on the AMR cluster in modules/redis.bicep). It lists the key and
# writes it to the `arcade-redis-password` Secret that the chart consumes via
# redis.auth.existingSecret.
#
# Runs in the `secrets` Kustomization (which the `arcade` Kustomization
# dependsOn + wait:true), so the Secret exists before the chart installs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arcade-redis-key-writer
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arcade-redis-key-writer
  namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arcade-redis-key-writer
subjects:
  - kind: ServiceAccount
    name: arcade-external-secrets-reader
    namespace: ${NAMESPACE}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: arcade-redis-key-${REDIS_CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: arcade-external-secrets-reader
      containers:
        - name: fetch-key
          image: mcr.microsoft.com/azure-cli:2.70.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Workload-identity federated login. The webhook injects
              # AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_FEDERATED_TOKEN_FILE.
              az login --service-principal \
                -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" \
                --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                --allow-no-subscriptions >/dev/null
              az account set --subscription "${SUBSCRIPTION_ID}"

              echo "==> Listing AMR access key for ${REDIS_CLUSTER_NAME}"
              KEY=$(az redisenterprise database list-keys \
                --cluster-name "${REDIS_CLUSTER_NAME}" \
                --database-name default \
                -g "${RESOURCE_GROUP}" \
                --query primaryKey -o tsv)
              if [[ -z "$KEY" ]]; then
                echo "FATAL: empty primaryKey from list-keys" >&2
                exit 1
              fi

              echo "==> Installing kubectl to a writable path"
              az aks install-cli --install-location /tmp/kubectl \
                --kubelogin-install-location /tmp/kubelogin --only-show-errors

              echo "==> Writing arcade-redis-password Secret (REDIS_PASSWORD)"
              # In-cluster kubectl uses the pod's ServiceAccount token + the
              # cluster CA automatically (no kubeconfig). RBAC above grants the
              # SA secrets create/patch in this namespace.
              /tmp/kubectl create secret generic arcade-redis-password \
                --namespace "${NAMESPACE}" \
                --from-literal=REDIS_PASSWORD="$KEY" \
                --dry-run=client -o yaml | /tmp/kubectl apply -f -
              echo "==> Done"
          env:
            - name: SUBSCRIPTION_ID
              value: "${SUBSCRIPTION_ID}"
            - name: RESOURCE_GROUP
              value: "${RESOURCE_GROUP}"
            - name: REDIS_CLUSTER_NAME
              value: "${REDIS_CLUSTER_NAME}"
            - name: NAMESPACE
              value: "${NAMESPACE}"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
