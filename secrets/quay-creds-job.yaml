# Quay pull-credential materializer (real Marketplace path).
#
# The publisher's images live in private quay.io/arcade/*. The customer has no
# credentials for them, and they CANNOT be embedded in the Marketplace zip (a
# literal dockerconfigjson @secure() default trips CredScan AND leaks the
# publisher robot to anyone who downloads the offer — package.sh's guard
# refuses it).
#
# Instead, this Job mints a per-customer Quay robot at runtime via the publisher
# mediator Worker, exactly like the redis-key Job lists the AMR key: an
# MRG-resident workload identity (exempt from the managed-app deny) gets an ARM
# token and calls the mediator. The mediator validates the token (signature +
# ARM audience + Entra issuer + freshness) and returns a per-customer robot
# scoped to read quay.io/arcade/*. No shared secret in the zip; revoking one
# customer's robot doesn't affect others.
#
# The mediator keys the robot off a stable resourceId. We pass the MRG's own
# resourceGroup id reshaped into the Microsoft.Solutions/applications form the
# mediator's structural check expects (it does NO ownership lookup on the
# credentials path — the resourceId is purely a stable per-customer label).
#
# Runs in the `secrets` Kustomization (arcade dependsOn + wait:true), so the
# arcade-quay-pull-secret exists before the chart's pods schedule.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arcade-quay-secret-writer
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arcade-quay-secret-writer
  namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arcade-quay-secret-writer
subjects:
  - kind: ServiceAccount
    name: arcade-external-secrets-reader
    namespace: ${NAMESPACE}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: arcade-quay-creds
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: arcade-external-secrets-reader
      containers:
        - name: mint-creds
          image: mcr.microsoft.com/azure-cli:2.70.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Workload-identity federated login (webhook injects AZURE_*).
              az login --service-principal \
                -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" \
                --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                --allow-no-subscriptions >/dev/null

              echo "==> Minting ARM token for mediator"
              BEARER=$(az account get-access-token \
                --resource https://management.azure.com/ \
                --query accessToken -o tsv)

              echo "==> Requesting per-customer Quay creds from mediator"
              RESP=$(curl --fail-with-body -sS \
                -X POST "${MEDIATOR_URL}/v1/registry/credentials" \
                -H "Authorization: Bearer $BEARER" \
                -H "Content-Type: application/json" \
                -d "{\"resourceId\":\"${MEDIATOR_RESOURCE_ID}\"}")
              U=$(printf '%s' "$RESP" | python3 -c "import json,sys;print(json.load(sys.stdin).get('username',''))")
              P=$(printf '%s' "$RESP" | python3 -c "import json,sys;print(json.load(sys.stdin).get('password',''))")
              if [[ -z "$U" || -z "$P" ]]; then
                echo "FATAL: mediator returned no credentials" >&2
                exit 1
              fi

              echo "==> Installing kubectl"
              az aks install-cli --install-location /tmp/kubectl \
                --kubelogin-install-location /tmp/kubelogin --only-show-errors

              echo "==> Writing arcade-quay-pull-secret (kubernetes.io/dockerconfigjson)"
              /tmp/kubectl create secret docker-registry arcade-quay-pull-secret \
                --namespace "${NAMESPACE}" \
                --docker-server=quay.io \
                --docker-username="$U" \
                --docker-password="$P" \
                --dry-run=client -o yaml | /tmp/kubectl apply -f -
              echo "==> Done"
          env:
            - name: MEDIATOR_URL
              value: "${MEDIATOR_URL}"
            - name: MEDIATOR_RESOURCE_ID
              value: "${MEDIATOR_RESOURCE_ID}"
            - name: NAMESPACE
              value: "${NAMESPACE}"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
