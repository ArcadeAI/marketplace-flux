# ClusterSecretStore bound to the customer's Key Vault via workload identity.
# The publisher writes secrets to KV at deploy time (see resourceGroup.bicep
# postgresPasswordSecret etc.). ESO reads them in-cluster — this avoids the
# Marketplace deny assignment because the read happens via pod workload
# identity, not via ARM resolving a deploy-time getSecret reference.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: arcade-kv
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://${KEY_VAULT_NAME}.vault.azure.net"
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
