apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 10m
  # Helm timeout per install/upgrade attempt. Default 5m is too tight on AKS —
  # Azure Standard LoadBalancer IP allocation takes 2-3 min, AND the chart's
  # `--wait` blocks until the LB Service has an external IP AND the 2 nginx
  # controller replicas are Ready. Default timeout exceeded repeatedly with
  # "context deadline exceeded" + Flux uninstall-remediation loop. 15m is
  # plenty of headroom for fresh-cluster cold-start.
  timeout: 15m
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ingress-nginx
      version: "4.11.x"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      replicaCount: 2
      service:
        externalTrafficPolicy: Local
        type: LoadBalancer
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      config:
        proxy-body-size: "10m"
      admissionWebhooks:
        timeoutSeconds: 30
