# Pre-warm Job — forces the ACR Artifact Cache to hydrate each chart image
# BEFORE the arcade HelmRelease tries to schedule pods that depend on them.
#
# Why this exists:
#   - ACR cacheRule hydrates lazily on first kubelet pull. Cache rule
#     propagation after provisioning takes ~30-60s (observed in smoke test
#     2026-06-26 — first pull returned 404, second pull 30s later succeeded).
#   - If helm install's pods race the propagation, kubelet ErrImagePull
#     followed by exponential backoff can stretch first-pod-ready past the
#     readinessProbe / livenessProbe / helm-install timeout windows.
#   - This Job runs 5 initContainers — one per chart image — that each pull
#     the image and exit immediately. Kubelet pulls trigger cache hydration;
#     subsequent helm install pulls are local cache hits.
#
# Why initContainers instead of a parallel pod-per-image:
#   - Each kubelet pull is sequential per node, so parallelism doesn't help.
#     One Pod with 5 initContainers runs the pulls back-to-back on one node,
#     which is the minimum work needed.
#   - Job's restartPolicy: OnFailure lets kubelet retry a transient pull
#     failure without us having to re-engineer the Job loop.
#
# Why no SA / role grant:
#   - The Job pod uses the namespace default ServiceAccount; image pulls
#     are done by kubelet against the cluster's attached ACR (AcrPull role
#     granted to kubelet identity in container-registry.bicep). No workload-
#     identity dance.
#
# This runs in the platform Kustomization (alongside cert-manager, ESO,
# ingress-nginx). The arcade Kustomization dependsOn platform; arcade
# HelmRelease starts only after this Job reports Succeeded.

apiVersion: batch/v1
kind: Job
metadata:
  name: arcade-image-prewarm-${IMAGE_TAG}
  namespace: flux-system
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      # Run on any available node — the cache is registry-side, not node-side,
      # so warming on one node hydrates the cache for all nodes.
      initContainers:
        - name: warm-dashboard
          image: ${ACR_LOGIN_SERVER}/arcade/dashboard:${IMAGE_TAG}
          command: ["true"]
        - name: warm-engine
          image: ${ACR_LOGIN_SERVER}/arcade/engine:${IMAGE_TAG}
          command: ["true"]
        - name: warm-coordinator
          image: ${ACR_LOGIN_SERVER}/arcade/coordinator:${IMAGE_TAG}
          command: ["true"]
        - name: warm-worker
          image: ${ACR_LOGIN_SERVER}/arcade/worker:${IMAGE_TAG}
          command: ["true"]
        - name: warm-experience-api
          image: ${ACR_LOGIN_SERVER}/arcade/experience-api:${IMAGE_TAG}
          command: ["true"]
      containers:
        - name: done
          # Smallest possible final container. Once all initContainers succeed,
          # this exits immediately and the Job reports Succeeded.
          image: ${ACR_LOGIN_SERVER}/arcade/dashboard:${IMAGE_TAG}
          command: ["true"]
