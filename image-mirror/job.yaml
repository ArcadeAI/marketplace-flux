# Image-mirror Job — one-shot. Imports the 5 Arcade chart images from
# quay.io/arcade/* into the customer's ACR via `az acr import` (server-side
# blob copy). Source creds come from the mediator Worker, exchanged for the
# Job UAMI's ARM token via workload-identity federation.
#
# Why a Job (vs HelmRelease postRenderer or CronJob):
#   - HelmRelease post-render only sees rendered chart manifests, no out-of-cluster
#     network calls.
#   - CronJob is overkill — we mirror once per deploy, not on a schedule. Re-runs
#     happen only when Flux reconciles a new fluxConfigurations.kustomization
#     revision (new chart version → new IMAGE_TAG substitution → new Job manifest).
#
# Why labels.azure.workload.identity/use=true on the Pod template (not just the
# ServiceAccount): the mutating webhook inspects pod labels to decide whether
# to inject the AZURE_CLIENT_ID/AZURE_FEDERATED_TOKEN_FILE env vars.
apiVersion: batch/v1
kind: Job
metadata:
  name: arcade-image-mirror-${CHART_VERSION}
  namespace: flux-system
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: arcade-image-mirror
      containers:
        - name: mirror
          image: mcr.microsoft.com/azure-cli:2.65.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/mirror.sh"]
          env:
            - name: ACR_LOGIN_SERVER
              value: "${ACR_LOGIN_SERVER}"
            - name: IMAGE_SOURCE_REGISTRY
              value: "${IMAGE_SOURCE_REGISTRY}"
            - name: IMAGE_TAG
              # Same tag the chart's image stanzas pin. When the chart version
              # bumps, this var moves with it (set by fluxConfigurations.postBuild).
              value: "${IMAGE_TAG}"
            - name: IMAGES
              value: "dashboard engine worker experience-api coordinator"
            - name: MEDIATOR_URL
              value: "${MEDIATOR_URL}"
            - name: MANAGED_APP_RESOURCE_ID
              value: "${MANAGED_APP_RESOURCE_ID}"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: arcade-image-mirror-script
            defaultMode: 0755
