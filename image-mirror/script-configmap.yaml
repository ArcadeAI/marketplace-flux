# Mirror script for the image-mirror Job. Lives in a ConfigMap so the Job
# manifest stays terse and the script is editable in-repo without rebaking
# the chart. Mounted at /scripts/mirror.sh inside the container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: arcade-image-mirror-script
  namespace: flux-system
data:
  mirror.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # Required env vars (set on the Job, substituted from fluxConfigurations.postBuild):
    #   ACR_LOGIN_SERVER         destination registry, e.g. arcadeacr123.azurecr.io
    #   IMAGE_SOURCE_REGISTRY    source path, e.g. quay.io/arcade
    #   IMAGE_TAG                tag to copy (same tag in src + dst)
    #   IMAGES                   space-separated short names (dashboard engine worker experience-api coordinator)
    #   MEDIATOR_URL             https://int.myarcade.dev (no trailing slash)
    #   MANAGED_APP_RESOURCE_ID  Microsoft.Solutions/applications resource id
    #   AZURE_CLIENT_ID          set by the workload-identity webhook
    #   AZURE_TENANT_ID          set by the workload-identity webhook
    #   AZURE_FEDERATED_TOKEN_FILE  set by the workload-identity webhook
    #   ACR_NAME                 derived from ACR_LOGIN_SERVER

    # Federated login via the SA's projected token. The workload-identity webhook
    # injects AZURE_* env vars on any pod whose SA is annotated with
    # azure.workload.identity/client-id; no `--allow-no-subscriptions` because the
    # UAMI lives in the same tenant as the customer subscription.
    echo "==> Federated login as UAMI $AZURE_CLIENT_ID in tenant $AZURE_TENANT_ID"
    az login --service-principal \
      --username "$AZURE_CLIENT_ID" \
      --tenant "$AZURE_TENANT_ID" \
      --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
      --output none

    # Mint an ARM-audience token. The mediator's verifyToken accepts
    # https://management.azure.com/ (or .core.windows.net) and rejects custom
    # audiences that aren't in EXPECTED_AUDIENCES. ARM is the safe default.
    echo "==> Minting ARM token for mediator call"
    BEARER=$(az account get-access-token \
      --resource https://management.azure.com/ \
      --query accessToken -o tsv)
    if [[ -z "$BEARER" ]]; then
      echo "FATAL: empty bearer token from az account get-access-token" >&2
      exit 1
    fi

    echo "==> Requesting pull credentials from mediator"
    RESP=$(curl -fsS \
      -X POST "${MEDIATOR_URL%/}/v1/registry/credentials" \
      -H "Authorization: Bearer $BEARER" \
      -H "Content-Type: application/json" \
      -d "{\"resourceId\":\"${MANAGED_APP_RESOURCE_ID}\"}")
    # Use python (present in the azure-cli image) instead of jq to parse JSON —
    # the azure-cli image doesn't ship jq and a runtime apt-get adds a slow
    # network hop on every Job retry.
    SRC_USER=$(printf '%s' "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('username',''))" 2>/dev/null || true)
    SRC_PASS=$(printf '%s' "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('password',''))" 2>/dev/null || true)
    if [[ -z "$SRC_USER" || -z "$SRC_PASS" ]]; then
      echo "FATAL: mediator response missing username/password" >&2
      echo "(response truncated to 200 chars: $(echo "$RESP" | head -c 200))" >&2
      exit 1
    fi

    # ACR_LOGIN_SERVER is <name>.azurecr.io; strip the suffix for `az acr import -n`.
    ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
    echo "==> Mirroring ${IMAGE_TAG} into $ACR_NAME"

    FAIL=0
    for img in $IMAGES; do
      src="${IMAGE_SOURCE_REGISTRY%/}/$img:${IMAGE_TAG}"
      dst="arcade/$img:${IMAGE_TAG}"
      echo "  $img  $src  ->  $ACR_NAME/$dst"
      if az acr import \
        --name "$ACR_NAME" \
        --source "$src" \
        --image "$dst" \
        --username "$SRC_USER" \
        --password "$SRC_PASS" \
        --force \
        --output none 2>/tmp/acr-import.err; then
        echo "    ok"
      else
        echo "    FAILED ($(head -c 300 /tmp/acr-import.err))" >&2
        FAIL=1
      fi
    done

    if (( FAIL )); then
      echo "==> One or more imports failed" >&2
      exit 1
    fi
    echo "==> All images mirrored"
