# ServiceAccount for the image-mirror Job. The azure.workload.identity/client-id
# annotation is what AKS workload-identity uses to exchange the SA's projected
# token for an Azure AD token bound to the image-mirror UAMI's principal id.
# The federated identity credential on the UAMI side (provisioned via
# modules/aks/workload-identity.bicep) ties this ServiceAccount subject
# (system:serviceaccount:flux-system:arcade-image-mirror) to that UAMI.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arcade-image-mirror
  namespace: flux-system
  annotations:
    azure.workload.identity/client-id: "${IMAGE_MIRROR_CLIENT_ID}"
    azure.workload.identity/tenant-id: "${TENANT_ID}"
  labels:
    azure.workload.identity/use: "true"
